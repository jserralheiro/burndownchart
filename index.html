<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprint Burndown Chart</title>
  <meta name="description"
    content="Ferramenta interativa de Burndown Chart para gestão de sprints ágeis com histórico de sprints." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #0d0f1a;
      --surface: #13162a;
      --surface2: #1a1f38;
      --surface3: #20264a;
      --border: #ffffff14;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --danger: #ff5c7a;
      --warn: #f5a623;
      --text: #e8eaf6;
      --muted: #8889aa;
      --radius: 14px;
      --shadow: 0 8px 32px #0007;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-logo {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar h1 {
      font-size: 1rem;
      font-weight: 700;
    }

    .topbar-sub {
      font-size: .73rem;
      color: var(--muted);
    }

    /* ── Sprint switcher ── */
    .sprint-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sprint-select-wrap {
      position: relative;
    }

    select.sprint-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      padding: 8px 36px 8px 14px;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      min-width: 160px;
      transition: border-color .2s;
    }

    select.sprint-select:focus {
      border-color: var(--accent);
    }

    .select-arrow {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: inherit;
      font-size: .83rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: #fff;
    }

    .btn-primary:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .btn-danger {
      background: #ff5c7a18;
      color: var(--danger);
      border: 1px solid #ff5c7a33;
    }

    .btn-danger:hover {
      background: #ff5c7a28;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: .78rem;
      border-radius: 6px;
    }

    .btn-full {
      width: 100%;
      justify-content: center;
    }

    /* ── Main layout ── */
    .page {
      padding: 28px 24px;
    }

    .layout {
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── Config strip ── */
    .config-strip {
      display: grid;
      grid-template-columns: 1fr 130px 130px auto;
      gap: 12px;
      align-items: end;
    }

    @media (max-width: 700px) {
      .config-strip {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* ── Add item row ── */
    .add-item-row {
      display: grid;
      grid-template-columns: 140px 1fr 1fr 80px auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }

    @media (max-width: 800px) {
      .add-item-row {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .card+.card {
      margin-top: 18px;
    }

    .card-title {
      font-size: .76rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .sep {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* ── Form ── */
    label {
      display: block;
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 5px;
      font-weight: 500;
    }

    input[type="number"],
    input[type="text"],
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: .88rem;
      padding: 9px 13px;
      outline: none;
      transition: border-color .2s;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    input[type="number"]::-webkit-inner-spin-button {
      opacity: .4;
    }

    .inline-input {
      width: 100%;
      background: var(--surface3);
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      padding: 4px 6px;
      outline: none;
    }

    .inline-input:focus {
      border-color: var(--accent2);
    }

    /* Flag indicator */
    .flag-dot-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      padding: 3px;
      color: #ef4444;
    }

    .flag-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .75rem;
      color: var(--text);
      white-space: nowrap;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .4);
      line-height: 1.7;
    }

    .flag-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--border);
    }

    .flag-dot-wrap:hover .flag-tooltip,
    .spillover-wrap:hover .flag-tooltip {
      display: block;
    }

    .spillover-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      cursor: help;
      margin-left: 6px;
      margin-right: 24px;
      font-size: 0.85rem;
    }

    /* Flag checkboxes in modal */
    .flag-checks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-bottom: 14px;
    }

    .flag-checks label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .82rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .flag-checks input[type="checkbox"] {
      accent-color: var(--accent);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .form-row {
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── Items table ── */
    .items-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .items-pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      font-size: .75rem;
      color: var(--muted);
    }

    .page-btns {
      display: flex;
      gap: 4px;
    }

    .page-btn {
      min-width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: inherit;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .page-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .items-table-header {
      display: grid;
      grid-template-columns: 32px 130px 1fr 130px 80px 84px;
      gap: 0 12px;
      padding: 7px 14px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .item-card {
      display: grid;
      grid-template-columns: 32px 130px 1fr 130px 80px 84px;
      gap: 0 12px;
      align-items: center;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    .item-card:hover {
      background: var(--surface2);
    }

    .item-card.done {
      border-color: #00d4aa33;
      background: #00d4aa07;
    }

    .item-name {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: .88rem;
    }

    .item-card.done .item-name {
      text-decoration: line-through;
      color: var(--muted);
    }

    .item-card.done .item-meta {
      opacity: 0.5;
    }

    .checkbox-wrap {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .2s;
      flex-shrink: 0;
    }

    .checkbox-wrap.checked {
      background: var(--accent2);
      border-color: var(--accent2);
    }

    .checkbox-wrap svg {
      display: none;
    }

    .checkbox-wrap.checked svg {
      display: block;
    }

    .item-name {
      font-size: .86rem;
      font-weight: 500;
    }

    .item-pts {
      font-size: .73rem;
      background: #ffffff0d;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 9px;
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
    }

    .item-day-tag {
      font-size: .7rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .item-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      transition: color .2s;
      padding: 3px;
    }

    .item-del:hover {
      color: var(--danger);
    }

    .empty {
      text-align: center;
      padding: 26px 0;
      color: var(--muted);
      font-size: .86rem;
    }

    .empty svg {
      opacity: .3;
      margin-bottom: 8px;
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: .7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.45rem;
      font-weight: 800;
    }

    .stat-value.green {
      color: var(--accent2);
    }

    .stat-value.purple {
      color: var(--accent);
    }

    .stat-value.pink {
      color: var(--danger);
    }

    /* ── Dropdown Menu ── */
    .dropdown-wrapper {
      position: relative;
      display: inline-block;
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      z-index: 200;
      min-width: 170px;
      overflow: hidden;
      flex-direction: column;
    }

    .dropdown-menu.open {
      display: flex;
    }

    .dropdown-item {
      background: transparent;
      border: none;
      color: var(--text);
      padding: 10px 14px;
      text-align: left;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dropdown-item:hover {
      background: var(--surface3);
    }

    .dropdown-item:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    /* ── Chart ── */
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 360px;
    }

    .progress-bar-wrap {
      margin-top: 14px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: .76rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 10px;
      transition: width .5s cubic-bezier(.4, 0, .2, 1);
    }

    /* ── Sprint DB sidebar ── */
    .sprint-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sprint-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }

    .sprint-item:hover {
      border-color: var(--accent);
      background: var(--surface3);
    }

    .sprint-item.active {
      border-color: var(--accent);
      background: #6c63ff14;
    }

    .sprint-item-info {
      flex: 1;
    }

    .sprint-item-name {
      font-size: .88rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .sprint-item-meta {
      font-size: .72rem;
      color: var(--muted);
    }

    .sprint-item-badge {
      font-size: .68rem;
      font-weight: 700;
      background: var(--accent2);
      color: #000;
      border-radius: 20px;
      padding: 1px 8px;
      white-space: nowrap;
    }

    .sprint-item-actions {
      display: flex;
      gap: 4px;
      margin-left: 8px;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      border-radius: 5px;
      transition: color .2s, background .2s;
    }

    .icon-btn:hover.delete {
      color: var(--danger);
    }

    .icon-btn:hover {
      color: var(--text);
      background: var(--surface3);
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000a;
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      animation: slideUp .2s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-actions .btn {
      flex: 1;
      justify-content: center;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 18px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 7px 10px;
      border-radius: 7px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      color: var(--muted);
      border: none;
      background: none;
      font-family: inherit;
    }

    .tab.active {
      background: var(--surface3);
      color: var(--text);
    }

    /* ── Global Spinner ── */
    .global-spinner-overlay {
      position: fixed;
      inset: 0;
      background: rgba(14, 17, 23, 0.7);
      backdrop-filter: blur(3px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .global-spinner-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner-circle {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    .spinner-text {
      color: var(--text);
      font-weight: 600;
      font-size: 0.9rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="global-spinner-overlay" id="globalSpinner">
    <div class="spinner-circle"></div>
    <div class="spinner-text">A Sincronizar...</div>
  </div>

  <!-- ── Top Bar ── -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
          stroke-linecap="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
      </div>
      <div>
        <div class="topbar h1" style="font-size:1rem;font-weight:700;">Sprint Burndown Chart</div>
      </div>
    </div>
    <div class="sprint-switcher">
      <div class="sprint-select-wrap">
        <select class="sprint-select" id="sprintDropdown" onchange="switchSprint(this.value)"></select>
        <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openNewSprintModal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Novo Sprint
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('importExcelInput').click()">
          📂 Importar
        </button>
        <input type="file" id="importExcelInput"
          accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel"
          style="display:none" onchange="importDataExcel(event)" />
        <div class="dropdown-wrapper">
          <button class="btn btn-ghost btn-sm" onclick="toggleExportMenu(event)">
            📥 Exportar
          </button>
          <div class="dropdown-menu" id="exportMenu">
            <button class="dropdown-item" onclick="exportDataJson()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <polyline points="16 16 12 20 8 16"></polyline>
                <line x1="12" y1="12" x2="12" y2="20"></line>
                <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
                <polyline points="16 16 12 20 8 16"></polyline>
              </svg>
              Exportar para JSON
            </button>
            <button class="dropdown-item" onclick="exportDataExcel()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

  <script>
    // ──────────────────────────────────────────────────────────────
    //  DB helpers
    //  Primary storage: JSONBin.io (Cloud)
    //  Fallback: localStorage (Offline safe)
    //  Structure: { activeSprint: id, sprints: [ { id, name, days, currentDay, items[], createdAt } ] }
    // ──────────────────────────────────────────────────────────────
    // Deteta se o utilizador está a desenvolver localmente via localhost ou file:// (Port 8000 é o proxy de "camuflagem" para Prod)
    const IS_DEV = (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && window.location.port !== '8000';

    // Separa a base de dados Local da Oficial de Produção
    const DB_KEY = IS_DEV ? 'burndown_db_dev' : 'burndown_db';
    const BIN_ID = IS_DEV ? '69e69213aaba8821971d5604' : '69d3d50daaba882197cd3fbd';
    const API_KEY = '$2a$10$b1zk.UlxUmhefLmBtQ66DOhVPYpHQN6tYqtixNMQrAJGBDCWlYxey';
    let cloudPushInFlight = false;
    let cloudPushPending = false;
    let bootComplete = false;
    let lastLocalChange = 0; // Timestamp da última alteração local (cooldown para polling)

    function loadLocalDB() {
      try { return JSON.parse(localStorage.getItem(DB_KEY)) || null; } catch { return null; }
    }

    function showSpinner() {
      const el = document.getElementById('globalSpinner');
      if (el) el.classList.add('active');
    }
    function hideSpinner() {
      const el = document.getElementById('globalSpinner');
      if (el) el.classList.remove('active');
    }

    // saveDB: Grava alterações feitas diretamente no objeto db (checkboxes, edições simples)
    function saveDB() {
      db.lastUpdated = Date.now();
      lastLocalChange = db.lastUpdated;
      localStorage.setItem(DB_KEY, JSON.stringify(db));
      refreshAll();
      scheduleCloudPush();
    }

    // mutateDB: Aplica uma função de mutação ao db e sincroniza (imports, add/delete)
    function mutateDB(mutationFn, options = {}) {
      const { quiet = false } = options;
      if (!quiet) showSpinner();

      db.lastUpdated = Date.now();
      lastLocalChange = db.lastUpdated;
      mutationFn(db);
      localStorage.setItem(DB_KEY, JSON.stringify(db));
      refreshAll();

      if (!quiet) hideSpinner();
      scheduleCloudPush();
    }

    // scheduleCloudPush: Fila inteligente de gravação na Cloud (nunca bloqueia o utilizador)
    async function scheduleCloudPush() {
      if (cloudPushInFlight) {
        cloudPushPending = true; // Marca que há dados mais recentes para enviar
        return;
      }
      cloudPushInFlight = true;
      try {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': API_KEY
          },
          body: JSON.stringify(db)
        });
      } catch (err) {
        console.error('Erro na Cloud:', err);
      } finally {
        cloudPushInFlight = false;
        if (cloudPushPending) {
          cloudPushPending = false;
          scheduleCloudPush(); // Reenvia com os dados mais recentes
        }
      }
    }

    function initDB(serverData) {
      // Prefer server data (most up-to-date), fallback to localStorage
      let db = serverData || loadLocalDB();
      if (!db || !db.sprints || db.sprints.length === 0) {
        if (serverData === null) {
          // Only create a default sprint when we KNOW there's no server data
          // (i.e., this is a truly fresh start, not just a slow network)
          const first = newSprintObj('Sprint 1', 10, 1);
          db = { activeSprint: first.id, sprints: [first] };
          // DON'T saveDB here — wait for cloud check to complete first
        } else {
          // Server returned empty — safe to create default and save
          const first = newSprintObj('Sprint 1', 10, 1);
          db = { activeSprint: first.id, sprints: [first] };
          localStorage.setItem(DB_KEY, JSON.stringify(db));
        }
      } else if (serverData) {
        // Sync server data to localStorage so offline still works
        localStorage.setItem(DB_KEY, JSON.stringify(db));
      }
      return db;
    }

    function newSprintObj(name, days, currentDay) {
      return { id: Date.now().toString(), name, days, currentDay: currentDay ?? 1, items: [], createdAt: new Date().toISOString() };
    }

    function getActive(db) { return db.sprints.find(s => s.id === db.activeSprint); }

    // ──────────────────────────────────────────────────────────────
    //  State
    // ──────────────────────────────────────────────────────────────
    let db;
    let chart = null;

    window.addEventListener('DOMContentLoaded', () => {
      const bindKeys = () => {
        document.getElementById('itemID').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
        document.getElementById('itemUsName').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
        document.getElementById('itemDev').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
        document.getElementById('newSprintName').addEventListener('keydown', e => { if (e.key === 'Enter') createSprint(); });
      };

      // 1. Show local data INSTANTLY (no waiting)
      db = initDB(null);
      refreshAll();
      bindKeys();

      // 2. Sync from cloud in background (silent update)
      fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { 'X-Master-Key': API_KEY }
      })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (data && data.record) {
            db = initDB(data.record);
            refreshAll();
          }
        })
        .catch(() => { })
        .finally(() => { bootComplete = true; }); // Boot concluído, polling pode começar

      // Allow clicking outside to close dropdowns
      document.addEventListener('click', () => {
        const menu = document.getElementById('exportMenu');
        if (menu && menu.classList.contains('open')) menu.classList.remove('open');
      });

      // 3. Silent Auto-Polling for Real-Time Collaboration
      setInterval(async () => {
        const spinner = document.getElementById('globalSpinner');
        // Imunidade de 15s após alterações locais para evitar que dados antigos pisem os novos
        const cooldownActive = (Date.now() - lastLocalChange) < 15000;
        if ((spinner && spinner.classList.contains('active')) || cloudPushInFlight || cloudPushPending || !bootComplete || cooldownActive) return;
        try {
          const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
          if (res.ok) {
            const data = await res.json();
            if (data && data.record && data.record.lastUpdated) {
              if (!db.lastUpdated || data.record.lastUpdated > db.lastUpdated) {
                db = data.record;
                localStorage.setItem(DB_KEY, JSON.stringify(db));
                refreshAll();
              }
            }
          }
        } catch (e) { }
      }, 7000);
    });

    function refreshAll() {
      populateDropdown();
      populateSprintList();
      loadSprintForm();
      updateDevFilterDropdown();
      renderItems();
      renderChart();
      updateStats();
    }

    // ──────────────────────────────────────────────────────────────
    //  Dropdown
    // ──────────────────────────────────────────────────────────────
    function populateDropdown() {
      const sel = document.getElementById('sprintDropdown');
      sel.innerHTML = '';
      [...db.sprints]
        .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }))
        .forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.name;
          opt.selected = s.id === db.activeSprint;
          sel.appendChild(opt);
        });
    }

    function switchSprint(id) {
      db.activeSprint = id;
      saveDB();
    }

    // ──────────────────────────────────────────────────────────────
    //  Sprint List (history tab)
    // ──────────────────────────────────────────────────────────────
    function populateSprintList() {
      const list = document.getElementById('sprintList');
      list.innerHTML = '';
      if (db.sprints.length === 0) {
        list.innerHTML = '<div class="empty"><p>Sem sprints criados.</p></div>';
        return;
      }
      [...db.sprints]
        .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }))
        .forEach(s => {
          const total = s.items.reduce((a, i) => a + i.pts, 0);
          const done = s.items.filter(i => i.done).reduce((a, i) => a + i.pts, 0);
          const pct = total ? Math.round(done / total * 100) : 0;
          const date = new Date(s.createdAt).toLocaleDateString('pt-PT');

          const div = document.createElement('div');
          div.className = 'sprint-item' + (s.id === db.activeSprint ? ' active' : '');
          div.innerHTML = `
          <div class="sprint-item-info" onclick="switchSprint('${s.id}'); showTab('sprint');" style="cursor:pointer">
            <div class="sprint-item-name">${escHtml(s.name)}</div>
            <div class="sprint-item-meta">${s.days} dias · ${total} SP · criado ${date}</div>
          </div>
          ${pct === 100 ? '<span class="sprint-item-badge">✓ Concluído</span>' : `<span style="font-size:.75rem;color:var(--muted);margin-left:8px;">${pct}%</span>`}
          <div class="sprint-item-actions">
            <button class="icon-btn delete" onclick="deleteSprint('${s.id}')" title="Eliminar sprint">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        `;
          list.appendChild(div);
        });
    }

    // ──────────────────────────────────────────────────────────────
    //  Tabs
    // ──────────────────────────────────────────────────────────────
    function showTab(t) {
      document.getElementById('panel-sprint').style.display = t === 'sprint' ? '' : 'none';
      document.getElementById('panel-db').style.display = t === 'db' ? '' : 'none';
      document.getElementById('tab-sprint').classList.toggle('active', t === 'sprint');
      document.getElementById('tab-db').classList.toggle('active', t === 'db');
      if (t === 'db') populateSprintList();
    }

    // ──────────────────────────────────────────────────────────────
    //  Config
    // ──────────────────────────────────────────────────────────────
    function loadSprintForm() {
      const s = getActive(db);
      if (!s) return;
      document.getElementById('sprintName').value = s.name;
      document.getElementById('sprintDays').value = s.days;
      document.getElementById('currentDay').value = s.currentDay;
      document.getElementById('sprintLabel').textContent = s.name;
    }

    function applyConfig() {
      const s = getActive(db);
      if (!s) return;
      s.name = document.getElementById('sprintName').value.trim() || s.name;
      s.days = Math.max(1, parseInt(document.getElementById('sprintDays').value) || 10);
      s.currentDay = Math.min(s.days, Math.max(1, parseInt(document.getElementById('currentDay').value) || 1));
      document.getElementById('currentDay').value = s.currentDay;
      document.getElementById('sprintLabel').textContent = s.name;
      saveDB();
      pulse('applyBtn');
    }

    // ──────────────────────────────────────────────────────────────
    //  Filtro por Dev
    // ──────────────────────────────────────────────────────────────
    let selectedDevFilter = 'all';

    function getFilteredItems() {
      const s = getActive(db);
      if (!s) return [];

      let items = s.items;
      if (selectedDevFilter !== 'all') {
        items = s.items.filter(i => i.dev && i.dev.trim() === selectedDevFilter);
      }

      // Ordenar alfabeticamente/numericamente pelo US ID (name) de forma crescente
      return items.slice().sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
    }

    function updateDevFilterDropdown() {
      const s = getActive(db);
      const select = document.getElementById('devFilter');
      const currentVal = selectedDevFilter;

      const devs = new Set();
      if (s) {
        s.items.forEach(i => {
          const d = i.dev ? i.dev.trim() : '';
          if (d) devs.add(d);
        });
      }

      let html = `<option value="all">Todos os Devs</option>`;
      Array.from(devs).sort().forEach(d => {
        html += `<option value="${escHtml(d)}">${escHtml(d)}</option>`;
      });

      select.innerHTML = html;
      if (devs.has(currentVal)) {
        select.value = currentVal;
      } else {
        select.value = 'all';
        selectedDevFilter = 'all';
      }
    }

    function filterByDev(val) {
      selectedDevFilter = val;
      currentPage = 1;
      renderItems();
      renderChart();
      updateStats();
    }

    // ──────────────────────────────────────────────────────────────
    //  Items
    // ──────────────────────────────────────────────────────────────
    let editingItemId = null;

    function editItem(id) {
      editingItemId = id;
      renderItems();
    }

    function cancelInlineEdit() {
      editingItemId = null;
      renderItems();
    }

    function saveInlineEdit(id) {
      const s = getActive(db);
      const item = s.items.find(i => i.id === id);
      if (!item) return;

      const newName = document.getElementById(`edit-id-${id}`).value.trim();
      if (!newName) return; // name is required

      item.name = newName;
      item.usName = document.getElementById(`edit-us-${id}`).value.trim();
      item.dev = document.getElementById(`edit-dev-${id}`).value.trim();

      const ptsVal = document.getElementById(`edit-pts-${id}`).value.trim();
      item.pts = Math.max(0, parseInt(ptsVal) || 0);

      editingItemId = null;
      saveDB();
    }

    function addItem() {
      const name = document.getElementById('itemID').value.trim();
      const usName = document.getElementById('itemUsName').value.trim();
      const dev = document.getElementById('itemDev').value.trim();
      const ptsVal = document.getElementById('itemPts').value.trim();

      if (!name) { document.getElementById('itemID').focus(); return; }

      // Verificar se o US ID já existe no Sprint (prevenir duplicados)
      const s = getActive(db);
      if (s) {
        const normalizedName = name.toLowerCase();
        const exists = s.items.some(i => String(i.name).trim().toLowerCase() === normalizedName);
        if (exists) {
          alert(`A tarefa "${name}" já existe neste Sprint!`);
          return;
        }
      }

      const pts = Math.max(0, parseInt(ptsVal) || 0);
      const newItem = { id: Date.now().toString(), name, usName, dev, pts, done: false, doneDay: null };

      document.getElementById('itemID').value = '';
      document.getElementById('itemUsName').value = '';
      document.getElementById('itemDev').value = '';
      document.getElementById('itemPts').value = '';
      document.getElementById('itemID').focus();

      mutateDB(latestDB => {
        const s = latestDB.sprints.find(sp => sp.id === latestDB.activeSprint);
        if (s) s.items.push(newItem);
      }, { quiet: true });
    }

    function toggleItem(id) {
      const s = getActive(db);
      const item = s.items.find(i => i.id === id);
      if (!item) return;
      item.done = !item.done;
      item.doneDay = item.done ? s.currentDay : null;
      saveDB();
    }

    function toggleAllItems() {
      const s = getActive(db);
      if (!s) return;
      const filtered = getFilteredItems();
      if (filtered.length === 0) return;

      const allDone = filtered.every(i => i.done);
      filtered.forEach(item => {
        item.done = !allDone;
        item.doneDay = item.done ? s.currentDay : null;
      });

      saveDB();
    }



    function deleteItem(id) {
      mutateDB(latestDB => {
        const s = latestDB.sprints.find(sp => sp.id === latestDB.activeSprint);
        if (s) s.items = s.items.filter(i => i.id !== id);
      }, { quiet: true });
    }

    // ──────────────────────────────────────────────────────────────
    //  Comments
    // ──────────────────────────────────────────────────────────────
    let commentItemId = null;

    const FLAG_DEFS = [
      { key: 'sp_changed', elId: 'flagSpChanged', label: '⚡ Alteração de SP' },
      { key: 'reassigned', elId: 'flagReassigned', label: '👤 Mudança de Assignee' },
      { key: 'help', elId: 'flagHelp', label: '🤝 Teve ajuda' },
      { key: 'scope_creep', elId: 'flagScopeCreep', label: '⚠️ Adicionado a meio' }
    ];

    function getFlagDotHtml(item) {
      const flags = item.flags || [];
      if (flags.length === 0) return '';
      const labels = flags.map(f => {
        const def = FLAG_DEFS.find(d => d.key === f);
        return def ? def.label : f;
      }).join('<br>');
      return `<span class="flag-dot-wrap"><svg width="13" height="13" viewBox="0 0 24 24" fill="#ef4444" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg><span class="flag-tooltip">${labels}</span></span>`;
    }

    function isSpillover(item) {
      if (item.forceSpillover) return true;
      if (!db || !db.sprints) return false;
      const currentSprint = getActive(db);
      if (!currentSprint) return false;

      const currentIdNum = Number(currentSprint.id);

      for (const sprint of db.sprints) {
        const sprintIdNum = Number(sprint.id);
        if (sprintIdNum < currentIdNum) {
          if (sprint.items.some(i => i.name === item.name)) {
            return true;
          }
        }
      }
      return false;
    }

    function openCommentModal(id) {
      const s = getActive(db);
      const item = s.items.find(i => i.id === id);
      if (!item) return;

      commentItemId = id;
      document.getElementById('itemComment').value = item.comment || '';

      // Populate flag checkboxes
      const flags = item.flags || [];
      FLAG_DEFS.forEach(f => {
        document.getElementById(f.elId).checked = flags.includes(f.key);
      });

      document.getElementById('commentModalOverlay').classList.add('open');
    }

    function closeCommentModal() {
      document.getElementById('commentModalOverlay').classList.remove('open');
      commentItemId = null;
    }

    function closeCommentModalOutside(e) {
      if (e.target.id === 'commentModalOverlay') closeCommentModal();
    }

    function saveComment() {
      if (!commentItemId) return;
      const s = getActive(db);
      const item = s.items.find(i => i.id === commentItemId);
      if (item) {
        item.comment = document.getElementById('itemComment').value;

        // Collect active flags
        item.flags = FLAG_DEFS
          .filter(f => document.getElementById(f.elId).checked)
          .map(f => f.key);

        saveDB();
      }
      closeCommentModal();
    }

    // ──────────────────────────────────────────────────────────────
    //  Render Items
    // ──────────────────────────────────────────────────────────────
    const PAGE_SIZE = 15;
    let currentPage = 1;

    function renderItems() {
      const s = getActive(db);
      const list = document.getElementById('itemsList');
      const empty = document.getElementById('emptyState');
      list.querySelectorAll('.item-card, .items-pagination').forEach(el => el.remove());
      list.style.maxHeight = '';

      const filtered = getFilteredItems();
      const selectAllWrap = document.getElementById('selectAllWrap');

      if (!s || filtered.length === 0) {
        empty.style.display = 'block';
        if (selectAllWrap) selectAllWrap.classList.remove('checked');
        return;
      }
      empty.style.display = 'none';

      if (selectAllWrap) {
        if (filtered.every(i => i.done)) selectAllWrap.classList.add('checked');
        else selectAllWrap.classList.remove('checked');
      }

      const total = filtered.length;
      const pages = Math.ceil(total / PAGE_SIZE);
      if (currentPage > pages && pages > 0) currentPage = pages;
      else if (pages === 0) currentPage = 1;

      const start = (currentPage - 1) * PAGE_SIZE;
      const end = Math.min(start + PAGE_SIZE, total);
      const slice = filtered.slice(start, end);

      slice.forEach(item => {
        const card = document.createElement('div');
        card.className = 'item-card' + (item.done ? ' done' : '');
        card.innerHTML = (editingItemId === item.id) ? `
          <div class="checkbox-wrap ${item.done ? 'checked' : ''}" style="cursor:default; opacity:0.5;">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <input type="text" class="inline-input" id="edit-id-${item.id}" value="${escHtml(item.name)}" style="font-weight:600; font-size:.88rem;" />
          <input type="text" class="inline-input" id="edit-us-${item.id}" value="${escHtml(item.usName || '')}" style="font-size:.85rem;" placeholder="US Name" />
          <input type="text" class="inline-input" id="edit-dev-${item.id}" value="${escHtml(item.dev || '')}" style="font-size:.85rem;" placeholder="Dev" />
          <input type="number" class="inline-input" id="edit-pts-${item.id}" value="${item.pts}" style="text-align:center;" min="0" />
          <div style="display:flex; gap:2px;">
            <button class="item-del" style="color:var(--accent2);" onclick="saveInlineEdit('${item.id}')" title="Guardar">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button class="item-del" onclick="cancelInlineEdit()" title="Cancelar">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        ` : `
          <div class="checkbox-wrap ${item.done ? 'checked' : ''}" onclick="toggleItem('${item.id}')">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="item-name"><span>${escHtml(item.name)}</span>${isSpillover(item) ? '<span class="spillover-wrap">⏪<span class="flag-tooltip">Spillover de sprint passado</span></span>' : ''}</span>
          <span class="item-meta" style="font-size:.85rem;">${escHtml(item.usName || '—')}</span>
          <span class="item-meta" style="font-size:.85rem;">${escHtml(item.dev || '—')}</span>
          <span class="item-pts" style="text-align:center;">${item.pts} SP</span>
          <div style="display:flex; gap:2px; align-items:center;">
            <button class="item-del" style="${item.comment ? 'color: var(--accent);' : ''}" onclick="openCommentModal('${item.id}')" title="Comentários">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="${item.comment ? 'var(--accent)' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </button>
            <button class="item-del" onclick="editItem('${item.id}')" title="Editar">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>
            <button class="item-del" onclick="deleteItem('${item.id}')" title="Apagar">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            ${getFlagDotHtml(item)}
          </div>
        `;
        list.insertBefore(card, empty);
      });

      // Pagination footer
      const pag = document.createElement('div');
      pag.className = 'items-pagination';

      // Page buttons
      let btns = '';
      for (let p = 1; p <= pages; p++) {
        btns += `<button class="page-btn${p === currentPage ? ' active' : ''}" onclick="goToPage(${p})">${p}</button>`;
      }

      pag.innerHTML = `
        <span>A mostrar ${start + 1}–${end} de ${total} itens</span>
        <div class="page-btns">${btns}</div>
      `;
      list.insertBefore(pag, empty);
    }

    function goToPage(p) {
      currentPage = p;
      renderItems();
    }

    // ──────────────────────────────────────────────────────────────
    //  Stats
    // ──────────────────────────────────────────────────────────────
    function updateStats() {
      const s = getActive(db);
      const items = getFilteredItems();
      const total = items.reduce((a, i) => a + i.pts, 0);
      const done = items.filter(i => i.done).reduce((a, i) => a + i.pts, 0);
      const left = total - done;
      const pct = total ? Math.round(done / total * 100) : 0;
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statDone').textContent = done;
      document.getElementById('statLeft').textContent = left;
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('progressFill').style.width = pct + '%';

      // US counts
      const usTotal = items.length;
      const usDone = items.filter(i => i.done).length;
      const usLeft = usTotal - usDone;
      document.getElementById('statUsTotal').textContent = usTotal;
      document.getElementById('statUsDone').textContent = usDone;
      document.getElementById('statUsLeft').textContent = usLeft;
    }

    // ──────────────────────────────────────────────────────────────
    //  Chart
    // ──────────────────────────────────────────────────────────────
    function renderChart() {
      const s = getActive(db);
      const days = s ? s.days : 10;
      const curDay = s ? s.currentDay : 0;
      const items = getFilteredItems();
      const total = items.reduce((a, i) => a + i.pts, 0);

      // Labels: Início + Dia 1..N
      const labels = ['Início', ...Array.from({ length: days }, (_, i) => `Dia ${i + 1}`)];

      // Ideal: straight line from total → 0
      const ideal = labels.map((_, i) => +(total - (total / days) * i).toFixed(2));

      // Actual: remaining SP per day, only up to curDay (nulls for future)
      // Day 0 (Início) always = total
      const actual = [total];
      for (let d = 1; d <= days; d++) {
        if (d <= curDay) {
          const burned = items
            .filter(i => i.done && i.doneDay != null && i.doneDay <= d)
            .reduce((a, i) => a + i.pts, 0);
          actual.push(total - burned);
        } else {
          actual.push(null); // future — no data yet
        }
      }

      const ctx = document.getElementById('burndownChart').getContext('2d');
      // Safely destroy any existing chart on this canvas (Chart.js v4)
      const existing = Chart.getChart('burndownChart');
      if (existing) existing.destroy();
      chart = null;

      const grad = ctx.createLinearGradient(0, 0, 0, 340);
      grad.addColorStop(0, '#6c63ff44');
      grad.addColorStop(1, '#6c63ff00');

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Linha Ideal',
              data: ideal,
              borderColor: '#00d4aacc',
              borderWidth: 2,
              borderDash: [6, 4],
              pointRadius: 0,
              fill: false,
              tension: 0,
              order: 2,
            },
            {
              label: 'Trabalho Restante',
              data: actual,
              borderColor: '#6c63ff',
              borderWidth: 3,
              pointBackgroundColor: actual.map((v, i) => {
                if (v === null) return 'transparent';
                const idealV = total - (total / days) * i;
                return v > idealV ? '#ff5c7a' : '#00d4aa';
              }),
              pointBorderColor: '#13162a',
              pointBorderWidth: 2,
              pointRadius: actual.map(v => v === null ? 0 : 5),
              pointHoverRadius: 8,
              fill: true,
              backgroundColor: grad,
              tension: 0.3,
              spanGaps: false,
              order: 1,
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: { color: '#8889aa', font: { family: 'Inter', size: 12 }, boxWidth: 18, padding: 18 }
            },
            tooltip: {
              backgroundColor: '#1a1f38', borderColor: '#ffffff14', borderWidth: 1,
              titleColor: '#e8eaf6', bodyColor: '#8889aa', padding: 12,
              callbacks: {
                label: c => ` ${c.dataset.label}: ${c.raw !== null ? c.raw + ' SP' : '—'}`
              }
            }
          },
          scales: {
            x: {
              grid: { color: '#ffffff08' },
              ticks: { color: '#8889aa', font: { family: 'Inter', size: 11 }, maxRotation: 0 }
            },
            y: {
              beginAtZero: true,
              suggestedMax: total > 0 ? Math.ceil(total * 1.1) : 10,
              grid: { color: '#ffffff0a' },
              ticks: { color: '#8889aa', font: { family: 'Inter', size: 11 }, callback: v => v + ' SP' }
            }
          }
        }
      });
    }

    // ──────────────────────────────────────────────────────────────
    //  Modal — New Sprint
    // ──────────────────────────────────────────────────────────────
    function openNewSprintModal() {
      const n = db.sprints.length + 1;
      document.getElementById('newSprintName').value = `Sprint ${n}`;
      document.getElementById('newSprintDays').value = '10';
      document.getElementById('newCurrentDay').value = '0';
      document.getElementById('modalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('newSprintName').select(), 100);
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
    function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

    function createSprint() {
      const name = document.getElementById('newSprintName').value.trim() || `Sprint ${db.sprints.length + 1}`;
      const days = Math.max(1, parseInt(document.getElementById('newSprintDays').value) || 10);
      const cur = Math.min(days, Math.max(1, parseInt(document.getElementById('newCurrentDay').value) || 1));
      const s = newSprintObj(name, days, cur);

      closeModal();
      mutateDB(latestDB => {
        latestDB.sprints.push(s);
        latestDB.activeSprint = s.id;
      });
    }

    // ──────────────────────────────────────────────────────────────
    //  Delete Sprint
    // ──────────────────────────────────────────────────────────────
    function deleteSprint(id) {
      if (db.sprints.length === 1) { alert('Não podes eliminar o único sprint existente.'); return; }
      if (!confirm('Tens a certeza que queres eliminar este sprint e todos os seus itens?')) return;

      mutateDB(latestDB => {
        latestDB.sprints = latestDB.sprints.filter(sp => sp.id !== id);
        if (latestDB.activeSprint === id) {
          latestDB.activeSprint = latestDB.sprints[latestDB.sprints.length - 1].id;
        }
      });
    }

    // ──────────────────────────────────────────────────────────────
    //  Helpers
    // ──────────────────────────────────────────────────────────────
    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function toggleExportMenu(e) {
      e.stopPropagation();
      const menu = document.getElementById('exportMenu');
      menu.classList.toggle('open');
    }

    function exportDataJson() {
      if (!db || !db.sprints) return alert('Não há dados para exportar.');
      const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'data.json';
      a.click();
    }

    function exportDataExcel() {
      const sprint = getActive(db);
      if (!sprint || sprint.items.length === 0) return alert('Não há tarefas no sprint atual para exportar.');

      // UTF-8 BOM so Excel automatically recognizes characters like á, ç, etc.
      let csv = '\uFEFF';
      // ';' delimiter for Excel PT
      csv += 'US ID;US Name;Dev;SP;Status;Dia;Flags;Spillover;Notas\n';

      sprint.items.forEach(item => {
        const estado = item.done ? 'Concluído' : 'Aberto';
        const dia = item.doneDay ? item.doneDay : '';
        const flags = (item.flags || []).join(', ');
        const spillover = isSpillover(item) ? 'Sim' : 'Não';

        // Escape fields to avoid delimiter collisions
        const escapeField = (f) => {
          if (!f) return '""';
          return `"${String(f).replace(/"/g, '""')}"`;
        };

        csv += [
          escapeField(item.name),
          escapeField(item.usName),
          escapeField(item.dev),
          item.pts,
          estado,
          dia,
          escapeField(flags),
          spillover,
          escapeField(item.comment)
        ].join(';') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `sprint_${sprint.id}_export.csv`;
      a.click();
    }

    async function importDataExcel(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function (e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const firstSheetName = workbook.SheetNames[0];
          const worksheet = workbook.Sheets[firstSheetName];
          const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

          if (!rows || rows.length < 2) {
            alert('O ficheiro não contém dados válidos.');
            event.target.value = '';
            return;
          }

          const newItems = [];
          let added = 0;
          let updated = 0;

          const headers = (rows[0] || []).map(h => h ? h.toString().trim().toLowerCase() : '');
          const getIdx = (name) => headers.findIndex(h => h.includes(name));

          const idIdx = getIdx('us id');
          const nameIdx = getIdx('name');
          const devIdx = getIdx('dev');
          const spIdx = getIdx('sp');
          const notasIdx = getIdx('nota');
          const spillIdx = getIdx('spillover');
          const flagsIdx = getIdx('flag');
          const doneIdx = headers.findIndex(h => h.includes('conclu') || h.includes('done') || h.includes('estado') || h.includes('status') || h === 'ok');

          if (idIdx === -1) {
            alert('Coluna "US ID" não encontrada no ficheiro.');
            event.target.value = '';
            return;
          }

          for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length === 0) continue;

            const usId = row[idIdx] ? row[idIdx].toString().trim() : '';
            if (!usId) continue;

            const usName = (nameIdx !== -1 && row[nameIdx]) ? row[nameIdx].toString().trim() : '';
            const dev = (devIdx !== -1 && row[devIdx]) ? row[devIdx].toString().trim() : '';
            const sp = (spIdx !== -1 && row[spIdx]) ? parseFloat(row[spIdx]) || 0 : 0;
            const notas = (notasIdx !== -1 && row[notasIdx]) ? row[notasIdx].toString().trim() : '';
            const spilloverText = (spillIdx !== -1 && row[spillIdx]) ? row[spillIdx].toString().trim().toLowerCase() : '';
            const flagsStr = (flagsIdx !== -1 && row[flagsIdx]) ? row[flagsIdx].toString().trim().toLowerCase() : '';

            const rawDone = (doneIdx !== -1 && row[doneIdx]) ? row[doneIdx].toString().trim().toLowerCase() : '';
            const isDone = ['sim', 'true', '1', 'x', 'concluído', 'concluido', 'done', 'fechado', 'closed'].includes(rawDone);

            const item = {
              id: Date.now().toString() + Math.floor(Math.random() * 10000),
              name: usId,
              usName: usName,
              dev: dev,
              pts: sp,
              done: isDone,
              doneDay: isDone ? 1 : null, // Default ao dia 1 se vier do Excel como feito
              comment: notas,
              flags: []
            };

            if (spilloverText === 'sim' || spilloverText === 'true' || spilloverText === '1') {
              item.forceSpillover = true;
            }

            if (flagsStr) {
              FLAG_DEFS.forEach(f => {
                if (flagsStr.includes(f.label.toLowerCase()) || flagsStr.includes(f.key.toLowerCase())) {
                  if (!item.flags.includes(f.key)) item.flags.push(f.key);
                }
              });
            }
            newItems.push(item);
          }

          if (newItems.length > 0) {
            mutateDB(latestDB => {
              const latestObj = latestDB.sprints.find(sp => sp.id === latestDB.activeSprint);
              if (latestObj) {
                newItems.forEach(newItem => {
                  const normalizedNewName = String(newItem.name).trim().toLowerCase();
                  const existing = latestObj.items.find(i => String(i.name).trim().toLowerCase() === normalizedNewName);
                  if (existing) {
                    // SE JÁ ESTIVER FEITO NO SITE, NÃO MEXEMOS (Proteção de Trabalho Concluido)
                    if (existing.done) return;

                    // Item está pendente: Atualiza os campos incluindo o possível novo estado de 'done' vindo do Excel
                    existing.usName = newItem.usName || existing.usName;
                    existing.dev = newItem.dev || existing.dev;
                    existing.pts = newItem.pts || 0;
                    existing.comment = newItem.comment || existing.comment;
                    existing.forceSpillover = newItem.forceSpillover || false;

                    // Sincroniza o Checkbox (Apenas para marcar como feito, já que ignoramos se já estiver feito acima)
                    if (newItem.done) {
                      existing.done = true;
                      existing.doneDay = existing.doneDay || latestObj.currentDay || 1;
                    }

                    // Sincroniza as Flags (Merge sem duplicados)
                    if (newItem.flags && newItem.flags.length > 0) {
                      newItem.flags.forEach(f => {
                        if (!existing.flags.includes(f)) existing.flags.push(f);
                      });
                    }
                    updated++;
                  } else {
                    // Novo US ID detetado: Adiciona!
                    if (newItem.done) newItem.doneDay = latestObj.currentDay || 1;
                    latestObj.items.push(newItem);
                    added++;
                  }
                });
              }
            });
            setTimeout(() => alert(`Importação Concluída:\n- ${added} novas tarefas criadas.\n- ${updated} tarefas existentes foram atualizadas com novos dados do Excel.`), 300);
          } else {
            alert('Nenhum item válido encontrado para importar.');
          }
        } catch (err) {
          console.error(err);
          alert('Erro ao processar ficheiro Excel. Verifica se o ficheiro é válido.');
        } finally {
          event.target.value = ''; // Reset file input
        }
      };

      reader.readAsArrayBuffer(file);
    }
    function pulse(id) {
      const el = document.getElementById(id);
      el.style.transform = 'scale(0.95)'; setTimeout(() => el.style.transform = '', 160);
    }

    // ── Esc to close modal
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
