<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprint Burndown Chart</title>
  <meta name="description" content="Ferramenta interativa de Burndown Chart para gestão de sprints ágeis com histórico de sprints." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d0f1a;
      --surface: #13162a;
      --surface2: #1a1f38;
      --surface3: #20264a;
      --border: #ffffff14;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --danger: #ff5c7a;
      --warn: #f5a623;
      --text: #e8eaf6;
      --muted: #8889aa;
      --radius: 14px;
      --shadow: 0 8px 32px #0007;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .topbar h1 { font-size: 1rem; font-weight: 700; }
    .topbar-sub { font-size: .73rem; color: var(--muted); }

    /* ── Sprint switcher ── */
    .sprint-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sprint-select-wrap {
      position: relative;
    }
    select.sprint-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      padding: 8px 36px 8px 14px;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      min-width: 160px;
      transition: border-color .2s;
    }
    select.sprint-select:focus { border-color: var(--accent); }
    .select-arrow {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: inherit; font-size: .83rem; font-weight: 600;
      cursor: pointer; border: none; transition: all .2s;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #4f46e5); color: #fff; }
    .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
    .btn-danger { background: #ff5c7a18; color: var(--danger); border: 1px solid #ff5c7a33; }
    .btn-danger:hover { background: #ff5c7a28; }
    .btn-sm { padding: 6px 12px; font-size: .78rem; border-radius: 6px; }
    .btn-full { width: 100%; justify-content: center; }

    /* ── Main layout ── */
    .page { padding: 28px 24px; }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      max-width: 1280px;
      margin: 0 auto;
    }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }
    .card + .card { margin-top: 18px; }
    .card-title {
      font-size: .73rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 16px;
    }
    .sep { height: 1px; background: var(--border); margin: 16px 0; }

    /* ── Form ── */
    label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
    input[type="number"], input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: inherit; font-size: .88rem;
      padding: 9px 13px; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    input[type="number"]::-webkit-inner-spin-button { opacity: .4; }
    .form-row { margin-bottom: 14px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .add-item-row {
      display: grid;
      grid-template-columns: 1fr 68px auto;
      gap: 8px; align-items: end;
      margin-bottom: 14px;
    }

    /* ── Items list ── */
    .items-list { display: flex; flex-direction: column; gap: 7px; max-height: 420px; overflow-y: auto; padding-right: 4px; }
    .item-card {
      display: grid;
      grid-template-columns: 28px 1fr auto auto;
      align-items: center; gap: 9px;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color .2s, background .2s;
    }
    .item-card.done { border-color: #00d4aa33; background: #00d4aa07; }
    .item-card.done .item-name { text-decoration: line-through; color: var(--muted); }
    .checkbox-wrap {
      width: 22px; height: 22px;
      border-radius: 6px; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .2s; flex-shrink: 0;
    }
    .checkbox-wrap.checked { background: var(--accent2); border-color: var(--accent2); }
    .checkbox-wrap svg { display: none; }
    .checkbox-wrap.checked svg { display: block; }
    .item-name { font-size: .86rem; font-weight: 500; }
    .item-pts {
      font-size: .73rem;
      background: #ffffff0d; border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 9px;
      color: var(--accent); font-weight: 600; white-space: nowrap;
    }
    .item-day-tag {
      font-size: .7rem; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 8px; white-space: nowrap;
    }
    .item-del { background: none; border: none; cursor: pointer; color: var(--muted); transition: color .2s; padding: 3px; }
    .item-del:hover { color: var(--danger); }
    .empty { text-align: center; padding: 26px 0; color: var(--muted); font-size: .86rem; }
    .empty svg { opacity: .3; margin-bottom: 8px; }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
    }
    .stat-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
    .stat-value { font-size: 1.45rem; font-weight: 800; }
    .stat-value.green { color: var(--accent2); }
    .stat-value.purple { color: var(--accent); }
    .stat-value.pink { color: var(--danger); }

    /* ── Chart ── */
    .chart-wrap { position: relative; width: 100%; height: 360px; }
    .progress-bar-wrap { margin-top: 14px; }
    .progress-label { display: flex; justify-content: space-between; font-size: .76rem; color: var(--muted); margin-bottom: 6px; }
    .progress-track { height: 6px; background: var(--surface2); border-radius: 10px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 10px; transition: width .5s cubic-bezier(.4,0,.2,1);
    }

    /* ── Sprint DB sidebar ── */
    .sprint-list { display: flex; flex-direction: column; gap: 8px; }
    .sprint-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .sprint-item:hover { border-color: var(--accent); background: var(--surface3); }
    .sprint-item.active { border-color: var(--accent); background: #6c63ff14; }
    .sprint-item-info { flex: 1; }
    .sprint-item-name { font-size: .88rem; font-weight: 600; margin-bottom: 2px; }
    .sprint-item-meta { font-size: .72rem; color: var(--muted); }
    .sprint-item-badge {
      font-size: .68rem; font-weight: 700;
      background: var(--accent2); color: #000;
      border-radius: 20px; padding: 1px 8px; white-space: nowrap;
    }
    .sprint-item-actions { display: flex; gap: 4px; margin-left: 8px; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; border-radius: 5px;
      transition: color .2s, background .2s;
    }
    .icon-btn:hover.delete { color: var(--danger); }
    .icon-btn:hover { color: var(--text); background: var(--surface3); }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: #000a; backdrop-filter: blur(4px);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      width: 100%; max-width: 420px;
      box-shadow: var(--shadow);
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; justify-content: center; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 18px; }
    .tab {
      flex: 1; text-align: center;
      padding: 7px 10px; border-radius: 7px; font-size: .8rem; font-weight: 600;
      cursor: pointer; transition: all .2s; color: var(--muted); border: none; background: none;
      font-family: inherit;
    }
    .tab.active { background: var(--surface3); color: var(--text); }
  </style>
</head>
<body>

  <!-- ── Top Bar ── -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div>
        <div class="topbar h1" style="font-size:1rem;font-weight:700;">Sprint Burndown Chart</div>
      </div>
    </div>
    <div class="sprint-switcher">
      <div class="sprint-select-wrap">
        <select class="sprint-select" id="sprintDropdown" onchange="switchSprint(this.value)"></select>
        <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openNewSprintModal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Sprint
      </button>
    </div>
  </div>

  <!-- ── Page ── -->
  <div class="page">
    <div class="layout">

      <!-- ── Left Panel ── -->
      <aside>
        <!-- Tabs -->
        <div class="tabs">
          <button class="tab active" id="tab-sprint" onclick="showTab('sprint')">Sprint Atual</button>
          <button class="tab" id="tab-db" onclick="showTab('db')">Histórico</button>
        </div>

        <!-- Sprint Config Tab -->
        <div id="panel-sprint">
          <div class="card">
            <div class="card-title">⚙ Configuração</div>
            <div class="form-row">
              <label for="sprintName">Nome do Sprint</label>
              <input type="text" id="sprintName" placeholder="Ex: Sprint 1" />
            </div>
            <div class="form-grid">
              <div class="form-row">
                <label for="sprintDays">Duração (dias)</label>
                <input type="number" id="sprintDays" min="1" max="30" value="10" />
              </div>
              <div class="form-row">
                <label for="currentDay">Dia Atual</label>
                <input type="number" id="currentDay" min="1" max="30" value="1" />
              </div>
            </div>
            <button class="btn btn-ghost btn-full btn-sm" onclick="applyConfig()" id="applyBtn">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
              Guardar Configuração
            </button>
          </div>

          <!-- Add Item -->
          <div class="card">
            <div class="card-title">📋 Itens do Sprint</div>
            <div class="add-item-row">
              <div>
                <label for="itemName">Item / User Story</label>
                <input type="text" id="itemName" placeholder="Nome da tarefa..." />
              </div>
              <div>
                <label for="itemPts">SP</label>
                <input type="number" id="itemPts" min="1" max="100" value="1" />
              </div>
              <div>
                <label>&nbsp;</label>
                <button class="btn btn-primary btn-sm" onclick="addItem()" style="height:36px;">+ Add</button>
              </div>
            </div>
            <div class="items-list" id="itemsList">
              <div class="empty" id="emptyState">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                <p>Sem itens ainda.</p>
              </div>
            </div>
          </div>
        </div>

        <!-- History Tab -->
        <div id="panel-db" style="display:none;">
          <div class="card">
            <div class="card-title">🗂 Todos os Sprints</div>
            <div class="sprint-list" id="sprintList"></div>
          </div>
        </div>
      </aside>

      <!-- ── Right Panel ── -->
      <main>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Total SP</div>
            <div class="stat-value purple" id="statTotal">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Concluídos</div>
            <div class="stat-value green" id="statDone">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Restantes</div>
            <div class="stat-value pink" id="statLeft">0</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📉 Burndown — <span id="sprintLabel">—</span></div>
          <div class="chart-wrap">
            <canvas id="burndownChart"></canvas>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-label">
              <span>Progresso</span>
              <span id="progressPct">0%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- ── New Sprint Modal ── -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <h2>➕ Criar Novo Sprint</h2>
      <div class="form-row">
        <label for="newSprintName">Nome do Sprint</label>
        <input type="text" id="newSprintName" placeholder="Ex: Sprint 2" />
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label for="newSprintDays">Duração (dias)</label>
          <input type="number" id="newSprintDays" min="1" max="30" value="10" />
        </div>
        <div class="form-row">
          <label for="newCurrentDay">Dia Atual</label>
          <input type="number" id="newCurrentDay" min="1" max="30" value="1" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="createSprint()">Criar Sprint</button>
      </div>
    </div>
  </div>

  <script>
    // ──────────────────────────────────────────────────────────────
    //  DB helpers
    //  Primary storage: server (data.json via /api/data)
    //  Fallback: localStorage (when running locally without server)
    //  Structure: { activeSprint: id, sprints: [ { id, name, days, currentDay, items[], createdAt } ] }
    // ──────────────────────────────────────────────────────────────
    const DB_KEY = 'burndown_db';
    const IS_SERVER = window.location.protocol !== 'file:'; // true when served by Flask

    function loadLocalDB() {
      try { return JSON.parse(localStorage.getItem(DB_KEY)) || null; } catch { return null; }
    }

    function saveDB(db) {
      // Always save to localStorage
      localStorage.setItem(DB_KEY, JSON.stringify(db));
      // If running on server, also sync to data.json (fire & forget)
      if (IS_SERVER) {
        fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(db)
        }).catch(() => {}); // silent fail — localStorage is the backup
      }
    }

    function initDB(serverData) {
      // Prefer server data (most up-to-date), fallback to localStorage
      let db = serverData || loadLocalDB();
      if (!db || !db.sprints || db.sprints.length === 0) {
        const first = newSprintObj('Sprint 1', 10, 1);
        db = { activeSprint: first.id, sprints: [first] };
        saveDB(db);
      } else if (serverData) {
        // Sync server data to localStorage so offline still works
        localStorage.setItem(DB_KEY, JSON.stringify(db));
      }
      return db;
    }

    function newSprintObj(name, days, currentDay) {
      return { id: Date.now().toString(), name, days, currentDay: currentDay ?? 1, items: [], createdAt: new Date().toISOString() };
    }

    function getActive(db) { return db.sprints.find(s => s.id === db.activeSprint); }

    // ──────────────────────────────────────────────────────────────
    //  State
    // ──────────────────────────────────────────────────────────────
    let db;
    let chart = null;

    window.addEventListener('DOMContentLoaded', () => {
      const init = (serverData) => {
        db = initDB(serverData);
        refreshAll();
        document.getElementById('itemName').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
        document.getElementById('newSprintName').addEventListener('keydown', e => { if (e.key === 'Enter') createSprint(); });
      };

      if (IS_SERVER) {
        // Try to load from server first
        fetch('/api/data')
          .then(r => r.status === 204 ? null : r.json())
          .then(data => init(data))
          .catch(() => init(null)); // fallback to localStorage
      } else {
        init(null); // local file: use localStorage only
      }
    });

    function refreshAll() {
      populateDropdown();
      populateSprintList();
      loadSprintForm();
      renderItems();
      renderChart();
      updateStats();
    }

    // ──────────────────────────────────────────────────────────────
    //  Dropdown
    // ──────────────────────────────────────────────────────────────
    function populateDropdown() {
      const sel = document.getElementById('sprintDropdown');
      sel.innerHTML = '';
      db.sprints.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name;
        opt.selected = s.id === db.activeSprint;
        sel.appendChild(opt);
      });
    }

    function switchSprint(id) {
      db.activeSprint = id;
      saveDB(db);
      refreshAll();
    }

    // ──────────────────────────────────────────────────────────────
    //  Sprint List (history tab)
    // ──────────────────────────────────────────────────────────────
    function populateSprintList() {
      const list = document.getElementById('sprintList');
      list.innerHTML = '';
      if (db.sprints.length === 0) {
        list.innerHTML = '<div class="empty"><p>Sem sprints criados.</p></div>';
        return;
      }
      db.sprints.forEach(s => {
        const total = s.items.reduce((a, i) => a + i.pts, 0);
        const done  = s.items.filter(i => i.done).reduce((a, i) => a + i.pts, 0);
        const pct   = total ? Math.round(done / total * 100) : 0;
        const date  = new Date(s.createdAt).toLocaleDateString('pt-PT');

        const div = document.createElement('div');
        div.className = 'sprint-item' + (s.id === db.activeSprint ? ' active' : '');
        div.innerHTML = `
          <div class="sprint-item-info" onclick="switchSprint('${s.id}'); showTab('sprint');" style="cursor:pointer">
            <div class="sprint-item-name">${escHtml(s.name)}</div>
            <div class="sprint-item-meta">${s.days} dias · ${total} SP · criado ${date}</div>
          </div>
          ${pct === 100 ? '<span class="sprint-item-badge">✓ Concluído</span>' : `<span style="font-size:.75rem;color:var(--muted);margin-left:8px;">${pct}%</span>`}
          <div class="sprint-item-actions">
            <button class="icon-btn delete" onclick="deleteSprint('${s.id}')" title="Eliminar sprint">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    // ──────────────────────────────────────────────────────────────
    //  Tabs
    // ──────────────────────────────────────────────────────────────
    function showTab(t) {
      document.getElementById('panel-sprint').style.display = t === 'sprint' ? '' : 'none';
      document.getElementById('panel-db').style.display    = t === 'db'     ? '' : 'none';
      document.getElementById('tab-sprint').classList.toggle('active', t === 'sprint');
      document.getElementById('tab-db').classList.toggle('active', t === 'db');
      if (t === 'db') populateSprintList();
    }

    // ──────────────────────────────────────────────────────────────
    //  Config
    // ──────────────────────────────────────────────────────────────
    function loadSprintForm() {
      const s = getActive(db);
      if (!s) return;
      document.getElementById('sprintName').value    = s.name;
      document.getElementById('sprintDays').value    = s.days;
      document.getElementById('currentDay').value    = s.currentDay;
      document.getElementById('sprintLabel').textContent = s.name;
    }

    function applyConfig() {
      const s = getActive(db);
      if (!s) return;
      s.name       = document.getElementById('sprintName').value.trim() || s.name;
      s.days       = Math.max(1, parseInt(document.getElementById('sprintDays').value) || 10);
      s.currentDay = Math.min(s.days, Math.max(1, parseInt(document.getElementById('currentDay').value) || 1));
      document.getElementById('currentDay').value = s.currentDay;
      document.getElementById('sprintLabel').textContent = s.name;
      saveDB(db);
      populateDropdown();
      renderItems();
      renderChart();
      updateStats();
      pulse('applyBtn');
    }

    // ──────────────────────────────────────────────────────────────
    //  Items
    // ──────────────────────────────────────────────────────────────
    function addItem() {
      const s    = getActive(db);
      const name = document.getElementById('itemName').value.trim();
      const pts  = Math.max(1, parseInt(document.getElementById('itemPts').value) || 1);
      if (!name) { document.getElementById('itemName').focus(); return; }
      s.items.push({ id: Date.now().toString(), name, pts, done: false, doneDay: null });
      document.getElementById('itemName').value = '';
      document.getElementById('itemPts').value  = '1';
      document.getElementById('itemName').focus();
      saveDB(db);
      renderItems();
      renderChart();
      updateStats();
    }

    function toggleItem(id) {
      const s    = getActive(db);
      const item = s.items.find(i => i.id === id);
      if (!item) return;
      item.done    = !item.done;
      item.doneDay = item.done ? s.currentDay : null;
      saveDB(db);
      renderItems();
      renderChart();
      updateStats();
    }



    function deleteItem(id) {
      const s = getActive(db);
      s.items = s.items.filter(i => i.id !== id);
      saveDB(db);
      renderItems();
      renderChart();
      updateStats();
    }

    // ──────────────────────────────────────────────────────────────
    //  Render Items
    // ──────────────────────────────────────────────────────────────
    function renderItems() {
      const s     = getActive(db);
      const list  = document.getElementById('itemsList');
      const empty = document.getElementById('emptyState');
      list.querySelectorAll('.item-card').forEach(el => el.remove());

      if (!s || s.items.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      s.items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'item-card' + (item.done ? ' done' : '');

        card.innerHTML = `
          <div class="checkbox-wrap ${item.done ? 'checked' : ''}" onclick="toggleItem('${item.id}')">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="item-name">${escHtml(item.name)}</span>
          <span class="item-pts">${item.pts} SP</span>
          <button class="item-del" onclick="deleteItem('${item.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        `;
        list.insertBefore(card, empty);
      });
    }

    // ──────────────────────────────────────────────────────────────
    //  Stats
    // ──────────────────────────────────────────────────────────────
    function updateStats() {
      const s     = getActive(db);
      const items = s ? s.items : [];
      const total = items.reduce((a, i) => a + i.pts, 0);
      const done  = items.filter(i => i.done).reduce((a, i) => a + i.pts, 0);
      const left  = total - done;
      const pct   = total ? Math.round(done / total * 100) : 0;
      document.getElementById('statTotal').textContent   = total;
      document.getElementById('statDone').textContent    = done;
      document.getElementById('statLeft').textContent    = left;
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('progressFill').style.width = pct + '%';
    }

    // ──────────────────────────────────────────────────────────────
    //  Chart
    // ──────────────────────────────────────────────────────────────
    function renderChart() {
      const s      = getActive(db);
      const days   = s ? s.days : 10;
      const curDay = s ? s.currentDay : 0;
      const items  = s ? s.items : [];
      const total  = items.reduce((a, i) => a + i.pts, 0);

      // Labels: Início + Dia 1..N
      const labels = ['Início', ...Array.from({ length: days }, (_, i) => `Dia ${i + 1}`)];

      // Ideal: straight line from total → 0
      const ideal = labels.map((_, i) => +(total - (total / days) * i).toFixed(2));

      // Actual: remaining SP per day, only up to curDay (nulls for future)
      // Day 0 (Início) always = total
      const actual = [total];
      for (let d = 1; d <= days; d++) {
        if (d <= curDay) {
          const burned = items
            .filter(i => i.done && i.doneDay != null && i.doneDay <= d)
            .reduce((a, i) => a + i.pts, 0);
          actual.push(total - burned);
        } else {
          actual.push(null); // future — no data yet
        }
      }

      const ctx = document.getElementById('burndownChart').getContext('2d');
      // Safely destroy any existing chart on this canvas (Chart.js v4)
      const existing = Chart.getChart('burndownChart');
      if (existing) existing.destroy();
      chart = null;

      const grad = ctx.createLinearGradient(0, 0, 0, 340);
      grad.addColorStop(0, '#6c63ff44');
      grad.addColorStop(1, '#6c63ff00');

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Linha Ideal',
              data: ideal,
              borderColor: '#00d4aacc',
              borderWidth: 2,
              borderDash: [6, 4],
              pointRadius: 0,
              fill: false,
              tension: 0,
              order: 2,
            },
            {
              label: 'Trabalho Restante',
              data: actual,
              borderColor: '#6c63ff',
              borderWidth: 3,
              pointBackgroundColor: actual.map((v, i) => {
                if (v === null) return 'transparent';
                const idealV = total - (total / days) * i;
                return v > idealV ? '#ff5c7a' : '#00d4aa';
              }),
              pointBorderColor: '#13162a',
              pointBorderWidth: 2,
              pointRadius: actual.map(v => v === null ? 0 : 5),
              pointHoverRadius: 8,
              fill: true,
              backgroundColor: grad,
              tension: 0.3,
              spanGaps: false,
              order: 1,
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: { color: '#8889aa', font: { family: 'Inter', size: 12 }, boxWidth: 18, padding: 18 }
            },
            tooltip: {
              backgroundColor: '#1a1f38', borderColor: '#ffffff14', borderWidth: 1,
              titleColor: '#e8eaf6', bodyColor: '#8889aa', padding: 12,
              callbacks: {
                label: c => ` ${c.dataset.label}: ${c.raw !== null ? c.raw + ' SP' : '—'}`
              }
            }
          },
          scales: {
            x: {
              grid: { color: '#ffffff08' },
              ticks: { color: '#8889aa', font: { family: 'Inter', size: 11 }, maxRotation: 0 }
            },
            y: {
              beginAtZero: true,
              suggestedMax: total > 0 ? Math.ceil(total * 1.1) : 10,
              grid: { color: '#ffffff0a' },
              ticks: { color: '#8889aa', font: { family: 'Inter', size: 11 }, callback: v => v + ' SP' }
            }
          }
        }
      });
    }

    // ──────────────────────────────────────────────────────────────
    //  Modal — New Sprint
    // ──────────────────────────────────────────────────────────────
    function openNewSprintModal() {
      const n = db.sprints.length + 1;
      document.getElementById('newSprintName').value    = `Sprint ${n}`;
      document.getElementById('newSprintDays').value    = '10';
      document.getElementById('newCurrentDay').value    = '0';
      document.getElementById('modalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('newSprintName').select(), 100);
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
    function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

    function createSprint() {
      const name = document.getElementById('newSprintName').value.trim() || `Sprint ${db.sprints.length + 1}`;
      const days = Math.max(1, parseInt(document.getElementById('newSprintDays').value) || 10);
      const cur  = Math.min(days, Math.max(1, parseInt(document.getElementById('newCurrentDay').value) || 1));
      const s    = newSprintObj(name, days, cur);
      db.sprints.push(s);
      db.activeSprint = s.id;
      saveDB(db);
      closeModal();
      refreshAll();
    }

    // ──────────────────────────────────────────────────────────────
    //  Delete Sprint
    // ──────────────────────────────────────────────────────────────
    function deleteSprint(id) {
      if (db.sprints.length === 1) { alert('Não podes eliminar o único sprint existente.'); return; }
      if (!confirm('Tens a certeza que queres eliminar este sprint e todos os seus itens?')) return;
      db.sprints = db.sprints.filter(s => s.id !== id);
      if (db.activeSprint === id) db.activeSprint = db.sprints[db.sprints.length - 1].id;
      saveDB(db);
      refreshAll();
    }

    // ──────────────────────────────────────────────────────────────
    //  Helpers
    // ──────────────────────────────────────────────────────────────
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function pulse(id) {
      const el = document.getElementById(id);
      el.style.transform = 'scale(0.95)'; setTimeout(() => el.style.transform = '', 160);
    }

    // ── Esc to close modal
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
