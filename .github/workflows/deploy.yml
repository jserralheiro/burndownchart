name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create config.js from secrets
        env:
          API_KEY: ${{ secrets.JSONBIN_API_KEY }}
          BIN_ID_DEV: ${{ secrets.JSONBIN_BIN_ID_DEV }}
          BIN_ID_PROD: ${{ secrets.JSONBIN_BIN_ID_PROD }}
        run: |
          printf "const CONFIG = {\n  API_KEY: '%s',\n  BIN_ID_DEV: '%s',\n  BIN_ID_PROD: '%s'\n};\n" \
            "$API_KEY" "$BIN_ID_DEV" "$BIN_ID_PROD" > config.js

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
